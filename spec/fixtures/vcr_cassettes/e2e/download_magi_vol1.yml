        within the deserts lie the mysterious Dungeons, vast stores of riches open
        for the taking by anyone lucky enough to find them \nand brave enough to venture
        into the depths from where few have ever returned. \nPlucky young adventurer
        Aladdin means to find the Dungeons and their riches, but he may be just as
        mysterious as the treasures he seeks. \nTogether with the Djinn Ugo and his
        friend Alibaba, Aladdin sets out to find his fortune in the depths of the
        endless dunes.  \n  \n**59th Shogakukan Manga Award winner in the Shounen
        category**","es":"En lo profundo de los desiertos se encuentran las misteriosas
        mazmorras, vastos dep\u00f3sitos de riquezas abiertos para que los tome cualquiera
        que tenga la suerte de encontrarlos y el coraje de aventurarse en las profundidades
        de donde pocos han regresado. El joven y valiente aventurero Aladino quiere
        encontrar las mazmorras y sus riquezas, pero Aladino puede ser tan misterioso
        como los tesoros que busca. Junto con el Djinn Ugo y su amigo, Alibaba, Aladino
        se propone encontrar su fortuna en las profundidades de las dunas interminables.  \n  \nGan\u00f3
        el 59\u00ba Premio Shogakukan Manga en la categor\u00eda Shounen.","pt":"Essa
        hist\u00f3ria \u00e9 sobre o fluxo do destino e da batalha para manter o mundo
        no caminho certo. Aladdin \u00e9 um garoto que tem a inten\u00e7\u00e3o de
        explorar o mundo depois de ficar preso em uma sala na maior parte de sua vida.
        Seu melhor amigo \u00e9 uma flauta com um djinn nele, chamado Ugo. Pouco tempo
        depois, Aladdin descobre que ele \u00e9 um Magi, um mago que escolhe os reis,
        e ele nasceu para escolher reis que v\u00e3o seguir o caminho justo, lutando
        contra aqueles que querem destruir o destino. Siga suas aventuras de como
        ele conhece os outros contos de \u0022Mil e Uma Noites\u0022, como Ali Bab\u00e1
        e Sinbad, e a luta para manter o equil\u00edbrio do mundo que est\u00e1 em
