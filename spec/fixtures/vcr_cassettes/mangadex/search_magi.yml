        \uc7ac\uc2dc\uc791"}],"description":{"de":"Keyaru wurde durch sein Unwissen
        immer und immer wieder ausgenutzt. Aber eines Tages erkannte er die wahre
        Macht der Heilmagie und kam zu der \u00dcberzeugung, dass ein Heiler die st\u00e4rkste
        Klasse sei. Wie auch immer, ehe ihm das Potential eines Heilers klar wurde,
        war er bereits allem beraubt worden. Daher wandte er seine Heilmagie auf die
        Welt selbst an und reiste so 4 Jahre in der Zeit zur\u00fcck. Er w\u00fcrde
        sich f\u00fcr alles r\u00e4chen, was man ihm angetan hatte. Dies ist die kranke
        heldenhafte Geschichte eines Heilers, der der st\u00e4rkste wurde, indem er
        sein Wissen \u00fcber Heilung und seine Erfahrungen aus seinem vorherigen
        Leben kombiniert.","en":"\"Healing magicians cannot fight alone.\"\n\nKeyaru,
        who was bound by this common knowledge, was exploited again and again by others.
        But one day, he noticed what lay beyond healing magic, and was convinced that
        a healing magician was the strongest class. However, by the time he realized
        that potential, he was deprived of everything. Thus, he used healing magic
        on the world itself to go back four years, deciding to redo everything.","it":"\"I
        maghi curatori non possono combattere da soli.\" Keyaru, che era legato a
        questa conoscenza comune, fu sfruttato pi\u00f9 e pi\u00f9 volte dagli altri.  \r\nMa
        un giorno not\u00f2 cosa c''era oltre la guarigione della magia e si convinse
        che il mago guaritore fosse la classe pi\u00f9 forte. Tuttavia, quando ne
        realizz\u00f2 il potenziale, fu privato di tutto. Cos\u00ec, usando la magia
        curativa sul mondo stesso, \u00e8 tornato indietro di quattro anni, determinato
        a ricominciare tutto da capo.","ja":"\u3010\u7652\u3011\u306e\u52c7\u8005\u30b1\u30e4\u30eb\u306f\u3001\u3042\u308b\u65e5\u3010\u56de\u5fa9(\u30d2\u30fc\u30eb)\u3011\u304c\u6700\u5f37\u306b\u81f3\u308b\u9b54\u6cd5\u3060\u3068\u78ba\u4fe1\u3059\u308b\u3002\u305d\u3057\u3066\u4e16\u754c\u305d\u306e\u3082\u306e\u3092\u3010\u56de\u5fa9\u3011\u3057\u3066\u56db\u5e74\u524d\u306b\u623b\u308a\u3001\u81ea\u5206\u306e\u4eba\u751f\u3092\u5f04\u3093\u3060\u8005\u305f\u3061\u3078\u5fa9\u8b90\u3059\u308b\u3053\u3068\u3092\u8a93\u3046\u306e\u3060\u3063\u305f\u3002","pl":"\"Uzdrowiciele
        nie mog\u0105 walczy\u0107 w pojedynk\u0119.\"  \r\nKeare, kt\u00f3ry wiedzia\u0142
        o tym a\u017c za dobrze, by\u0142 raz po raz wykorzystywany przez innych.  \r\nAle
        pewnego dnia odkrywa co\u015b, co kryje si\u0119 poza magi\u0105 uzdrowienia,
        i zyskuje pewno\u015b\u0107, \u017ce uzdrowiciel to najpot\u0119\u017cniejsza
        z klas maga. Jednak\u017ce zanim zda\u0142 sobie spraw\u0119 z jej potencja\u0142u,
        zosta\u0142 ju\u017c pozbawiony wszystkiego, co mia\u0142. Dlatego w\u0142a\u015bnie
        u\u017cy\u0142 magii uzdrowienia na samym \u015bwiecie, by cofn\u0105\u0107
        si\u0119 w czasie o cztery lata, postanawiaj\u0105c, \u017ce zacznie wszystko
        od nowa.  \r\nOto heroiczna opowie\u015b\u0107 o pewnym uzdrowicielu, kt\u00f3ry
        sta\u0142 si\u0119 najsilniejszym dzi\u0119ki wykorzystaniu wiedzy z dawnego
        \u017cycia i magii uzdrawiania.","pt-br":"\"Magos de cura n\u00e3o podem lutar
        sozinhos.\" \n\nKeare, que estava vinculado por esse conhecimento comum, foi
        explorado uma vez ou outra pelos outros. Mas um dia, ele notou o que estava
        al\u00e9m da magia de cura e estava convencido de que um mago de cura era
        a classe mais forte. No entanto, quando percebeu esse potencial, ele estava
        privado de tudo. Assim, ele usou a magia de cura no pr\u00f3prio mundo para
        voltar quatro anos, decidindo refazer tudo. Este \u00e9 um conto heroico de
        um mago de cura que se tornou o mais forte usando o conhecimento de sua vida
        passada e magia de cura."},"isLocked":false,"links":{"al":"100476","ap":"redo-of-healer","bw":"series\/156159\/list","kt":"40299","mu":"m8ajqa8","mal":"108197","raw":"https:\/\/comic-walker.com\/contents\/detail\/KDCW_KS11000027010000_68\/"},"officialLinks":null,"originalLanguage":"ja","lastVolume":"","lastChapter":"","publicationDemographic":"seinen","status":"ongoing","year":2017,"contentRating":"erotica","tags":[{"id":"0bc90acb-ccc1-44ca-a34a-b9f3a73259d0","type":"tag","attributes":{"name":{"en":"Reincarnation"},"description":{},"group":"theme","version":1},"relationships":[]},{"id":"292e862b-2d17-4062-90a2-0356caa4ae27","type":"tag","attributes":{"name":{"en":"Time
