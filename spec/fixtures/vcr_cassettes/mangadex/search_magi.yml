        don''t know how it happened, but somehow I''ve died and reincarnated into
        my favorite academy game. And if that wasn''t weird enough, I''m now the depraved
        and lazy villain, Weiss Fansent, whose misdeeds lead him to a deadly end.
        Something I''m determined to avoid at all costs. With little time left until
        the academy''s entrance exams, I have no choice but to dive headfirst into
        serious and grueling training. Which means swordsmanship with the S-rank adventurer
        Miruku Abitas, followed by intense magic practice. It was demanding and exhausting,
        but getting stronger means I have a better chance of avoiding my disastrous
        end.\n\nBut I seriously underestimated just how powerful Weiss truly is, and
        I wind up stunning everyone at the exams! Have I somehow become more powerful
        than the hero?\n\n*Source: Seven Seas Entertainent, Vol. 1*\n___\n**Links:**\n-
