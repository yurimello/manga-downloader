        Nh\u01b0ng L\u1ea1i C\u00f3 M\u1eb7t Tr\u00ean Chi\u1ebfn Tr\u01b0\u1eddng"}],"description":{"en":"Usato,
        an ordinary high schooler, happens to run into two fellow students after school
        one rainy day. Suddenly, all three of them are engulfed in a magic circle
        and transported to a fantasy world. There''s just one tiny problem \u2014
        Usato is simply dragged along by accident!  On top of that, Usato learns that
        he is capable of using healing magic \u2014 an incredibly rare affinity in
        this new world. Now Usato must spend his days with the rescue team thugs,
        struggling through their hellish training regimen \u2014 learning the wrong
        way to use healing magic.","ja":"\u6700\u524d\u7dda\u3092\u99c6\u3051\u308b\u306e\u306f\u3001\u5e38\u8b58\u7834\u308a\u306e\u56de\u5fa9\u8981\u54e1\uff01\uff1f\n\n\u5e73\u51e1\u306a\u9ad8\u6821\u751f\u306e\u30a6\u30b5\u30c8\u306f\u3001\u540c\u3058\u5b66\u6821\u306e\u30b9\u30ba\u30cd\u3001\u30ab\u30ba\u30ad\u3068\u5171\u306b\u7570\u4e16\u754c\u3078\u3068\u8ee2\u79fb\u3057\u3066\u3057\u307e\u3046\u3002\u4e09\u4eba\u306f\u9b54\u738b\u8ecd\u304b\u3089\u738b\u56fd\u3092\u6551\u3046\u305f\u3081\u306e\u300e\u52c7\u8005\u300f\u3068\u3057\u3066\u559a\u3073\u51fa\u3055\u308c\u305f\u2015\u2015\u304c\u3001
        \u52c7\u8005\u3068\u3057\u3066\u306e\u9069\u6027\u3092\u6301\u3064\u306e\u306f\u30b9\u30ba\u30cd\u3068\u30ab\u30ba\u30ad\u3060\u3051\u3002\u30a6\u30b5\u30c8\u306f\u305f\u3060\u5dfb\u304d\u8fbc\u307e\u308c\u305f\u3060\u3051\u3060\u3063\u305f\uff01\u3057\u304b\u3057\u3001\u30a6\u30b5\u30c8\u306b\u30ec\u30a2\u5c5e\u6027\u306e\u300e\u6cbb\u7652\u9b54\u6cd5\u4f7f\u3044\u300f\u306e\u7d20\u990a\u304c\u898b\u3064\u304b\u3063\u305f\u3053\u3068\u3067\u4e8b\u614b\u306f\u4e00\u5909\u3057\u2026\uff01\uff1f\u300c\u5c0f\u8aac\u5bb6\u306b\u306a\u308d\u3046\u300d\u767a\uff01\u30ae\u30e3\u30b0\u3042\u308a\u30d0\u30c8\u30eb\u3042\u308a\u306e\u30c9\u30bf\u30d0\u30bf\u7570\u4e16\u754c\u30d5\u30a1\u30f3\u30bf\u30b8\u30fc\uff01","pt":"Usato
        Ken \u00e9 um estudante normal do segundo ano do ensino m\u00e9dio. Em um
        certo dia chuvoso, as duas pessoas mais admiradas do conselho estudantil,
        Inukami Suzune e Ryuusen Kazuki, percebem que ele n\u00e3o tem um guarda-chuva,
        ent\u00e3o Kazuki empresta o seu para ele. Depois eles acabam conversando
        enquanto v\u00e3o embora juntos, mas de repente s\u00e3o convocados para outro
