services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3333:3333"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RAILS_ENV=development
    depends_on:
      - redis
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
      - ${DOWNLOAD_DIR:-~/Comics/Manga}:/downloads

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bundle exec sidekiq -C config/sidekiq.yml
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RAILS_ENV=development
    depends_on:
      - redis
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
      - ${DOWNLOAD_DIR:-~/Comics/Manga}:/downloads

volumes:
  redis_data:
  bundle_cache:
